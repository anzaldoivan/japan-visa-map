name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: App (test, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run test:run

      - run: npm run build

  library:
    name: Library (test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # prepare runs the rollup build, exercising it as part of install
      - run: npm ci

      - run: npm test
